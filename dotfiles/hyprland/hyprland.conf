# hyprland.conf
# Basic Hyprland configuration with touchpad gestures

general {
   # basic behaviour
   dpi = 96
   vsync = true
   decoration = no
   animation = true
   animation-step = 0.03
   animation-window = 0.2
   smart-gaps = true
   hide_cursor = 3
   padding_left = 8
   padding_right = 8
   padding_top = 24
   padding_bottom = 8
}

# monitor setup
monitor = eDP-1, 1920x1080@60, 0x0, preferred

# simple input defaults
input "default" {
   map_to_output = eDP-1
   sensitivity = 1.0
   accel = 0.5
}

# basic keybindings
bind = SUPER+ENTER, exec, alacritty
bind = SUPER+d, exec, rofi -show drun
bind = SUPER+q, killactive

# gestures
gesture = SWIPE_RIGHT 3, exec, hyprctl dispatch workspace 2
gesture = SWIPE_LEFT 3, exec, hyprctl dispatch workspace 1
gesture = SWIPE_UP 3, exec, hyprctl dispatch workspace 3
gesture = SWIPE_DOWN 3, exec, hyprctl dispatch workspace 4
gesture = SWIPE_UP 4, exec, hyprctl dispatch togglefloating
gesture = SWIPE_DOWN 4, exec, hyprctl dispatch togglednd